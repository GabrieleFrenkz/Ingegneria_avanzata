# =============================================================================
# Continuous Integration
#
# Trigger:
#   - Pull request (qualsiasi branch)
#   - Push diretto su main
#
# Strategia:
#   1. changes: filtra i path modificati per saltare job inutili
#   2. Backend (Rails 8): lint (rubocop), security (brakeman + bundler-audit),
#      test (minitest, con SimpleCov)
#   3. Frontend (Angular 21): test (vitest, con coverage-v8)
#      Nota: niente job di lint frontend, ESLint non è configurato nel progetto.
#   4. docker-build: builda entrambe le immagini come sanity check (NON pubblica)
#   5. e2e: Playwright, usa il webServer già configurato in playwright.config.ts
#      per avviare da solo backend Rails + frontend Angular
#   6. ci-success: gate finale per il branch protection
# =============================================================================

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancella esecuzioni precedenti dello stesso branch/PR per non sprecare runner.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Path filter: stabilisce quali parti del repo sono cambiate
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'Frontend/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'Backend/Dockerfile'
              - 'Frontend/Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'

  # ---------------------------------------------------------------------------
  # Backend: lint (rubocop)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend lint (Rubocop)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: Backend
          bundler-cache: true

      - name: Run Rubocop
        run: bin/rubocop -f github

  # ---------------------------------------------------------------------------
  # Backend: security scans (Brakeman SAST + bundler-audit CVE)
  # ---------------------------------------------------------------------------
  backend-security:
    name: Backend security (Brakeman + bundler-audit)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: Backend
          bundler-cache: true

      - name: Brakeman (Rails static analysis)
        # "bin/brakeman" aggiunge sempre "--ensure-latest", che fallisce la CI
        # ogni volta che esce una nuova versione della gem anche senza nuovi
        # warning di sicurezza reali. Chiamiamo brakeman direttamente.
        run: bundle exec brakeman -q

      - name: Bundler-audit (vulnerable gems)
        run: bin/bundler-audit

  # ---------------------------------------------------------------------------
  # Backend: test (Minitest + SimpleCov)
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend test (Minitest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    env:
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: Backend
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Run Minitest
        run: bin/rails test

      - name: Upload coverage report (SimpleCov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: Backend/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Frontend: test (Vitest + coverage-v8)
  # ---------------------------------------------------------------------------
  frontend-test:
    name: Frontend test (Vitest)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (with coverage)
        run: npm run test:coverage

      - name: Upload coverage report (v8)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: Frontend/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Docker build (Continuous Delivery — costruisce ma NON pubblica)
  # Verifica che entrambe le immagini si compilino con successo.
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker images build check
    needs: [changes, backend-test, frontend-test]
    # Gira anche se i cambiamenti sono solo Docker; salta se un test ha fallito.
    if: |
      always()
      && !cancelled()
      && !contains(needs.*.result, 'failure')
      && (needs.changes.outputs.docker == 'true'
          || needs.changes.outputs.backend == 'true'
          || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: shop-backend:ci-${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: false
          tags: shop-frontend:ci-${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ---------------------------------------------------------------------------
  # E2E (Playwright) — full-stack flow tests
  # playwright.config.ts ha già un blocco "webServer" che avvia da solo
  # backend Rails (bin/rails server) e frontend Angular (npm start): qui
  # basta preparare gemme/dipendenze e lanciare la suite.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    needs: [changes, backend-test, frontend-test]
    if: |
      always()
      && !cancelled()
      && !contains(needs.*.result, 'failure')
      && (needs.changes.outputs.backend == 'true'
          || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: Backend
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: Frontend
        env:
          CI: '1'
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: Frontend/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Gate finale: aggregato per branch protection rules
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    needs:
      - backend-lint
      - backend-security
      - backend-test
      - frontend-test
      - docker-build
      - e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          if echo '${{ toJSON(needs) }}' | grep -q '"result": "failure"'; then
            echo "Almeno un job richiesto è fallito."
            exit 1
          fi
          echo "Tutti i job richiesti sono passati."
