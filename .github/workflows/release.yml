# =============================================================================
# Continuous Deployment
#
# Trigger:
#   - Push di un tag SemVer (es. v1.0.0, v2.3.1)
#
# Cosa fa:
#   1. Builda le immagini Docker di backend e frontend
#   2. Le pubblica su GitHub Container Registry (ghcr.io) con:
#      - tag SemVer esatto (es. 1.0.0)
#      - tag 'latest'
#
# Come usarlo:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Le immagini saranno disponibili a:
#   ghcr.io/<owner>/flowboard-backend:1.0.0
#   ghcr.io/<owner>/flowboard-frontend:1.0.0
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write   # Necessario per pubblicare su ghcr.io

jobs:
  publish:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          # Rimuove il prefisso 'v' dal tag git per ottenere la versione SemVer.
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Owner della repo in lowercase (richiesto da GHCR).
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          echo "## Released v${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images published to GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-backend:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ steps.meta.outputs.owner_lc }}/flowboard-frontend:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
